let curTheater = "all";
let curTier    = "all";

function setTheater(v, btn) {
  curTheater = v;
  document.querySelectorAll(".theater-btns .fb").forEach(b => b.classList.remove("on"));
  btn.classList.add("on");
  const hdr = document.getElementById("hdr");
  hdr.classList.remove("mode-tokyo", "mode-osaka");
  if (v === "東京") hdr.classList.add("mode-tokyo");
  if (v === "大阪") hdr.classList.add("mode-osaka");
  const main = document.getElementById("main");
  main.classList.remove("mode-tokyo", "mode-osaka");
  if (v === "東京") main.classList.add("mode-tokyo");
  if (v === "大阪") main.classList.add("mode-osaka");
  render();
}

function setTier(v, btn) {
  curTier = v;
  document.querySelectorAll(".tier-btns .fb").forEach(b => b.classList.remove("on"));
  btn.classList.add("on");
  render();
}

function calcYear(tokyoN) {
  return CURRENT_YEAR - (tokyoN + TOKYO_BASE) + 1;
}

function parseNsc(s) {
  if (!s) return null;
  const m = s.match(/^(東京|大阪)(\d+)期$/);
  if (!m) return null;
  return { region: m[1], num: parseInt(m[2]) };
}

function groupKey(nscStr) {
  const p = parseNsc(nscStr);
  if (!p) return { sortN: 9999, tokyoLabel: "不明", osakaLabel: "", yearN: null };
  const tokyoN = p.region === "大阪" ? p.num - OSAKA_DIFF : p.num;
  const osakaN = tokyoN + OSAKA_DIFF;
  return {
    sortN:      tokyoN,
    tokyoLabel: `東京${tokyoN}期`,
    osakaLabel: `大阪${osakaN}期`,
    yearN:      calcYear(tokyoN),
  };
}

function ek(s) { return s.replace(/[^\w\u3000-\u9fff]/g, "_"); }

function render() {
  let list = MEMBERS;
  if (curTheater !== "all") list = list.filter(m => m[1] === curTheater);
  if (curTier !== "all")    list = list.filter(m => m[2] === curTier);

  const gmap = {};
  list.forEach(m => {
    const g = groupKey(m[5]);
    const k = g.tokyoLabel;
    if (!gmap[k]) gmap[k] = { sortN: g.sortN, tokyoLabel: g.tokyoLabel, osakaLabel: g.osakaLabel, yearN: g.yearN, arr: [] };
    gmap[k].arr.push(m);
  });

  const sorted = Object.entries(gmap).sort((a, b) => a[1].sortN - b[1].sortN);
  const known  = sorted.filter(([k]) => k !== "不明");

  document.getElementById("jumpnav").innerHTML =
    `<div class="fbtns tier-btns">
      <button class="fb${curTier==='all'?' on':''}" onclick="setTier('all',this)">全員</button>
      <button class="fb${curTier==='極'?' on':''}" onclick="setTier('極',this)">極</button>
      <button class="fb${curTier==='翔'?' on':''}" onclick="setTier('翔',this)">翔</button>
    </div>`;

  document.getElementById("stat").innerHTML =
    `<span>表示: <strong>${list.length}組</strong></span>` +
    `<span style="margin-left:auto;color:var(--text-dim);font-size:10px">更新: ${UPDATED_AT}</span>`;

  document.getElementById("main").innerHTML = sorted.map(([k, g]) => {
    const unk = k === "不明";
    let label = unk
      ? `<div class="lmain">不明</div>`
      : `<div class="lmain">${g.tokyoLabel}</div><div class="lsub-nsc">${g.osakaLabel}</div>`;
    return `<div class="nsc-row" id="r${ek(k)}">
      <div class="label-col${unk ? " unk" : ""}">
        ${label}
        ${!unk && g.yearN !== null ? `<div class="lyear">${g.yearN}年目</div>` : ""}
        <div class="lsub" style="margin-top:4px">${g.arr.length}組</div>
      </div>
      <div class="members-col">${g.arr.map(cardHtml).join("")}</div>
    </div>`;
  }).join("");
}

function cardHtml(m) {
  const [name, theater, tier, id, people] = m;
  const href = id ? `https://profile.yoshimoto.co.jp/talent/detail?id=${id}` : "#";
  const colorClass = curTheater === "all" ? (theater === "東京" ? " tokyo" : " osaka") : "";
  return `<a class="card${colorClass}" href="${href}" target="_blank" rel="noopener" data-name="${name}">
    <div class="cname">${name}</div>
    ${people ? `<div class="cppl">${people}</div>` : ""}
  </a>`;
}

// ── 検索機能 ──
const searchInput   = document.getElementById("searchInput");
const searchSuggest = document.getElementById("searchSuggest");

searchInput.addEventListener("input", () => {
  const q = searchInput.value.trim();
  if (!q) { searchSuggest.classList.remove("open"); return; }

  const hits = MEMBERS.filter(m =>
    m[0].includes(q) || m[4].includes(q)
  ).slice(0, 8);

  if (!hits.length) { searchSuggest.classList.remove("open"); return; }

  searchSuggest.innerHTML = hits.map(m => {
    const g = groupKey(m[5]);
    const nameHl = m[0].replace(q, `<span class="si-highlight">${q}</span>`);
    return `<div class="suggest-item" data-rowid="r${ek(g.tokyoLabel)}" data-name="${m[0]}">
      <div class="si-name">${nameHl}</div>
      <div class="si-nsc">${g.tokyoLabel} / ${g.osakaLabel}${g.yearN ? ` / ${g.yearN}年目` : ""}</div>
    </div>`;
  }).join("");

  searchSuggest.classList.add("open");
});

searchSuggest.addEventListener("click", e => {
  const item = e.target.closest(".suggest-item");
  if (!item) return;
  const rowId = item.dataset.rowid;
  searchInput.value = item.dataset.name;
  searchSuggest.classList.remove("open");
  const row = document.getElementById(rowId);
  if (row) {
    row.scrollIntoView({ behavior: "smooth", block: "center" });
    // ハイライト
    row.querySelectorAll(".card").forEach(c => {
      if (c.dataset.name === item.dataset.name) {
        c.classList.add("highlight");
        setTimeout(() => c.classList.remove("highlight"), 2000);
      }
    });
  }
});

document.addEventListener("click", e => {
  if (!e.target.closest(".search-wrap")) {
    searchSuggest.classList.remove("open");
  }
});

render();
</script>
